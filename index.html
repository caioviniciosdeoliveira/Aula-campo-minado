<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campo Minado SQL - Responsivo</title>
    <style>
        :root {
            --grid-gap: 8px;
            --background-color: #1800ee;
            --cell-color-initial: #6c757d;   
            --cell-color-named-html: #e34f26; /* Laranja HTML */
            --cell-color-revealed: #ffffff; 
            --text-color-light: #ffffff;
            --text-color-dark: #000000;
            --border-color: #dee2e6;
            --border-radius: 8px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--background-color);
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        
        h1 {
            color: #000000;
            margin-bottom: 20px;
            text-align: center;
        }

        .grid-container {
            display: grid;
            width: 100%;
            max-width: 1400px;
            grid-template-columns: repeat(10, 1fr);
            gap: var(--grid-gap);
        }

        .cell {
            aspect-ratio: 1 / 1; 
            width: 100%;
            border-radius: var(--border-radius);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-weight: bold;
            padding: 5px;
            box-sizing: border-box;
            transition: transform 0.3s ease, background-color 0.3s, color 0.3s;
            user-select: none;
            background-color: var(--cell-color-initial);
            color: var(--text-color-light);
            font-size: clamp(14px, 3vw, 24px);
        }

        .cell:not(.revealed):hover {
            transform: scale(1.05);
            z-index: 10;
        }

        .cell.named.type-html {
            background-color: var(--cell-color-named-html);
        }
        
        .cell.named {
            color: var(--text-color-light);
            font-size: clamp(10px, 1.8vw, 16px);
            word-break: break-all;
        }
        
        .cell.revealed {
            background-color: var(--cell-color-revealed);
            color: var(--text-color-dark);
            border: 1px solid var(--border-color);
            font-weight: normal;
            cursor: default;
            justify-content: center;
            align-items: center;
            padding: 8px;
            font-size: clamp(9px, 1.2vw, 14px);
            line-height: 1.2;
        }
    </style>
</head>
<body>

<h1>Campo Minado:Tags SQL</h1>
<div class="grid-container" id="minefield"></div>

<script>
    const minefield = document.getElementById('minefield');
    
    // Lista expandida para 100 itens, apenas com HTML
    const items = [
        { type: 'html', name: '<SELECT>', answer: 'Recupera dados de uma tabela.' },
        { type: 'html', name: '<INSERT>', answer: 'Adiciona novos registros.' },
        { type: 'html', name: '<UPDATE>', answer: 'Modifica registros existentes.' },
        { type: 'html', name: '<DELETE>', answer: 'Remove registros.' },
        { type: 'html', name: '<CREATE TABLE>', answer: 'Cria uma nova tabela.' },
        { type: 'html', name: '<ALTER TABLE>', answer: 'Modifica uma tabela .' },
        { type: 'html', name: '<DROP TABLE>', answer: 'Exclui uma tabela inteira.' },
        { type: 'html', name: '<CREATE DATABASE>', answer: 'Cria um novo banco de dados.' },
        { type: 'html', name: '<WHERE>', answer: 'Filtra resultados.' },
        { type: 'html', name: '<JOIN (INNER/LEFT/RIGHT)>', answer: 'Combina dados de tabelas relacionadas.' },
        
    ];

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    shuffle(items);

    items.forEach((item, index) => {
        const cell = document.createElement('div');
        cell.classList.add('cell');
        cell.textContent = index + 1;
        cell.dataset.name = item.name;
        cell.dataset.answer = item.answer;
        cell.dataset.type = item.type;

        cell.addEventListener('click', function() {
            if (this.classList.contains('revealed')) return;
            
            if (this.classList.contains('named')) {
                this.classList.remove('named', 'type-html');
                this.classList.add('revealed');
                this.textContent = this.dataset.answer;
                return;
            }
            
            this.classList.add('named', 'type-html');
            this.textContent = this.dataset.name;
        });

        minefield.appendChild(cell);
    });
</script>

</body>
</html>
